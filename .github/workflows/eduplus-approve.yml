name: eduplus 承認チェック

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = JST 11:00
  workflow_dispatch:  # 手動実行も可能

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eduplus_approve.py
        run: python eduplus_approve.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          EDUPLUS_MASTER_ID: ${{ secrets.EDUPLUS_MASTER_ID }}
          EDUPLUS_MASTER_PW: ${{ secrets.EDUPLUS_MASTER_PW }}
          EDUPLUS_CHAT_ID: ${{ secrets.EDUPLUS_CHAT_ID }}
